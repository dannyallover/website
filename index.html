<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dannyallover</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- The `.container` element will contain all the images -->
  <!-- It will be used also to perform the 'custom scroll' behavior -->
  <div class="container">
    <!-- Each following `div` correspond to one image -->
    <!-- The images will be set using CSS backgrounds -->
    <div class ="image vh-fix">
      <div class="image1 vh-fix">
      </div>
    </div>
    <div class ="image vh-fix">
      <div class="image2 vh-fix" onclick="window.open('cv/cv.pdf','_blank');" style="cursor: pointer;">
      </div>
      <span style="text-align: center; margin-top: 500px; display: block; font-size:30pt; font-family:Georgia">cv</span>
    </div>
    <div class="image vh-fix">
      <div class="image3 vh-fix" onclick="window.open('books/books.html','_blank');" style="cursor: pointer;">
      </div>
      <span style="text-align: center; margin-top: 210px; margin-right:155px; display: block; font-size:30pt; font-family:Georgia">books</span>
    </div>
    <div class="image vh-fix">
      <div class="image4 vh-fix" onclick="window.open('microblog/microblog.html','_blank');" style="cursor: pointer;">
      </div>
      <span style="text-align: center; margin-top: 210px; margin-left:100px; display: block; font-size:30pt; font-family:Georgia">microblog</span>
    </div>
    <div class="image vh-fix">
      <div class="image5 vh-fix" onclick="window.open('writing/main.html','_blank');" style="cursor: pointer;">
      </div>
      <span style="text-align: center; margin-top: 205px; margin-right:60px; display: block; font-size:30pt; font-family:Georgia">writing</span>
    </div>
    <div class="image vh-fix">
      <div class="image6 vh-fix" onclick="window.open('gym/main.html','_blank');" style="cursor: pointer;">
      </div>
      <span style="text-align: center; margin-top: 195px; margin-left:30px; display: block; font-size:30pt; font-family:Georgia">gym</span>
    </div>
    <div class="image vh-fix"></div>
    <div class="image vh-fix"></div>
    <div class="image vh-fix"></div>
    <div class="image vh-fix"></div>
  </div>

  <script src='js/vh-fix.js'></script>
  <script src='js/scripts.js'></script>
</body>
</html>
